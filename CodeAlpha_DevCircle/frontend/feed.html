<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevCircle — Feed</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-brand">Dev<span>Circle</span></div>
  <ul class="navbar-nav">
    <li>
      <input
        type="text"
        id="searchInput"
        class="form-control"
        placeholder="Search users..."
        style="width: 200px; padding: 0.4rem 0.8rem; font-size: 0.85rem;"
      />
    </li>
    <li><a href="feed.html">Feed</a></li>
    <li><a href="#" id="profileLink">Profile</a></li>
    <li class="bell-wrap">
      <a href="#" id="bellBtn" style="font-size: 1.1rem;">🔔</a>
      <span class="notif-badge" id="notifBadge"></span>
    </li>
    <li><a href="#" id="logoutBtn">Logout</a></li>
    <li>
      <img src="" alt="avatar" class="nav-avatar" id="navAvatar"
        onerror="this.src='https://ui-avatars.com/api/?background=58a6ff&color=0d1117&name=U'" />
    </li>
  </ul>
</nav>

<!-- Search Results Dropdown -->
<div id="searchResults" style="
  display: none;
  position: fixed;
  top: 65px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 250px;
  z-index: 200;
  padding: 0.5rem;
"></div>

<!-- Main Layout -->
<div class="container">
  <div class="layout">

    <!-- Feed -->
    <main>
      <!-- Create Post -->
      <div class="create-post">
        <div class="create-post-header">
          <img src="" alt="avatar" class="post-avatar" id="createAvatar"
            onerror="this.src='https://ui-avatars.com/api/?background=58a6ff&color=0d1117&name=U'" />
          <textarea
            id="postContent"
            class="form-control"
            placeholder="What's on your mind, dev?"
            rows="3"
          ></textarea>
        </div>
        <div class="create-post-footer">
          <label class="file-label" for="postImage">
            📎 Attach Image
          </label>
          <input type="file" id="postImage" class="file-input" accept="image/*" />
          <span id="fileName" style="font-size: 0.8rem; color: var(--text-muted);"></span>
          <button class="btn btn-primary btn-sm" id="submitPost">Post</button>
        </div>
      </div>

      <!-- Posts Feed -->
      <div id="feedContainer">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </main>

    <!-- Sidebar -->
    <aside class="sidebar" style="position: sticky; top: 70px; height: fit-content;">

      <!-- My Links -->
      <div class="sidebar-card" style="margin-bottom: 1rem;">
        <div class="sidebar-title">// My Links</div>
        <div id="sidebarLinks">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Who to Follow -->
      <div class="sidebar-card">
        <div class="sidebar-title">// Who to Follow</div>
        <div id="suggestions">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>

    </aside>

  </div>
</div>

<!-- Notification Popup -->
<div class="notif-popup" id="notifPopup">
  <div class="notif-popup-header">
    <span>Notifications</span>
    <button id="markReadBtn">Mark all read</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>

<script src="js/api.js"></script>
<script src="js/feed.js"></script>
<script src="js/notifications.js"></script>
</body>
</html>
