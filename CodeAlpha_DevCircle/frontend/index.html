<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevCircle — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-wrapper">

  <!-- Login Section -->
  <div id="loginSection" class="auth-card">
    <div style="margin-bottom: 2rem;">
      <div class="navbar-brand" style="font-size: 1.6rem; margin-bottom: 0.5rem;">
        Dev<span>Circle</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your developer community</p>
    </div>

    <div id="loginError" class="alert alert-error" style="display:none;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
        Sign In
      </button>
    </form>

    <div class="auth-switch">
      Don't have an account?
      <a href="#" id="showRegister">Create one</a>
    </div>
  </div>

  <!-- Register Section -->
  <div id="registerSection" class="auth-card" style="display:none;">
    <div style="margin-bottom: 2rem;">
      <div class="navbar-brand" style="font-size: 1.6rem; margin-bottom: 0.5rem;">
        Dev<span>Circle</span>
      </div>
      <h1 class="auth-title">Join DevCircle</h1>
      <p class="auth-subtitle">Connect with developers worldwide</p>
    </div>

    <div id="registerError" class="alert alert-error" style="display:none;"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" class="form-control" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label for="regUsername">Username</label>
        <input type="text" id="regUsername" class="form-control" placeholder="johndoe" required />
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
        Create Account
      </button>
    </form>

    <div class="auth-switch">
      Already have an account?
      <a href="#" id="showLogin">Sign in</a>
    </div>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
