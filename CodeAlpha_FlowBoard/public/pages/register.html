<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowBoard — Register</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <span class="brand-icon">⬡</span>
      <h1>FlowBoard</h1>
      <p>Organize work. Ship faster.</p>
    </div>

    <div class="auth-card">
      <h2>Create account</h2>
      <p class="auth-sub">Start managing projects today</p>

      <div id="error-msg" class="alert alert-error hidden"></div>
      <div id="success-msg" class="alert alert-success hidden"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="yourname" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn btn-primary btn-full" id="register-btn">Create Account</button>

      <p class="auth-switch">
        Already have an account? <a href="/">Sign in</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
